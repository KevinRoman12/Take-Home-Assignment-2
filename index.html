<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Famous Quotes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            text-align: center;
            padding: 50px;
        } 
        
        h1 {
            color: black;
        }
        
        #quoteBtn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        #quoteBtn:hover {
            background-color: #0056b3;
        }
        
        #quoteDisplay {
            margin-top: 30px;
            font-size: 22px;
            color: #222;
            background-color: white;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        
    </style>
</head>
    
<body>

    <h1>Famous Quotes</h1>
    
    <button id="quoteBtn"> Click here for a quote from history!</button>
    
    <div id="quoteDisplaye">The quote shall appear here shortly </div>
    
    <script src="script.js"></script>
</body>
</html>
